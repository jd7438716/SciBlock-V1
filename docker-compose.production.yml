name: sciblock-prod

services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: sciblock-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sciblock}
      POSTGRES_USER: ${POSTGRES_USER:-sciblock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sciblock-prod-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sciblock} -d ${POSTGRES_DB:-sciblock}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: sciblock-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sciblock}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sciblock}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET: ${ADMIN_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ENV: ${ENV:-production}
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_PORT: ${BACKEND_PORT:-8080}
      GO_PORT: ${GO_PORT:-8082}
      GO_API_URL: http://127.0.0.1:${GO_PORT:-8082}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_BOOTSTRAP_SQL: ${RUN_BOOTSTRAP_SQL:-true}
      RUN_SEED: ${RUN_SEED:-false}
      DB_REWRITE_LOCALHOST: ${DB_REWRITE_LOCALHOST:-false}
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_PORT:-8080}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.BACKEND_PORT || 8080) + '/api/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: sciblock-frontend
    environment:
      BACKEND_UPSTREAM: backend:${BACKEND_PORT:-8080}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-22333}:80"
    restart: unless-stopped

volumes:
  sciblock-prod-postgres-data:
